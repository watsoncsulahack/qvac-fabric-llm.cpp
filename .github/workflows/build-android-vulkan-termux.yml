name: Android Vulkan Termux bundle

on:
  workflow_dispatch:
  push:
    branches: [fix/android-qwen35-loader]
    paths:
      - '.github/workflows/build-android-vulkan-termux.yml'
      - 'src/llama-model.cpp'
      - 'src/models/**'
      - 'common/**'
      - 'ggml/**'

jobs:
  android-arm64-vulkan:
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: 29.0.14206865
    steps:
      - uses: actions/checkout@v6
      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699
        with:
          log-accepted-android-sdk-licenses: false
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y glslc ninja-build
          sdkmanager "ndk;${NDK_VERSION}"
          echo "ANDROID_NDK=${ANDROID_SDK_ROOT}/ndk/${NDK_VERSION}" >> "$GITHUB_ENV"
      - name: Configure and build
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="${ANDROID_NDK}/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-28 \
            -DGGML_VULKAN=ON \
            -DGGML_NATIVE=OFF \
            -DGGML_OPENMP=OFF \
            -DLLAMA_OPENSSL=OFF \
            -DLLAMA_CURL=OFF
          cmake --build build --target llama-server llama-cli llama-gguf -j "$(nproc)"
      - name: Stage self-contained bundle
        run: |
          mkdir -p artifact
          cp -a build/bin/. artifact/
          cp -a "${ANDROID_NDK}/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/libc++_shared.so" artifact/
          printf '%s\n' "commit=$(git rev-parse HEAD)" "built=$(date -u +%FT%TZ)" > artifact/BUILD-INFO.txt
      - uses: actions/upload-artifact@v6
        with:
          name: qvac-llama-android-arm64-vulkan
          path: artifact
          compression-level: 6
